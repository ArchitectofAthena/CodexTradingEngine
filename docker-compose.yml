version: '3.8'

services:
  eve-q-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eve-q-slurperbot
    restart: unless-stopped

    # Environment configuration
    env_file:
      - .env

    # Mount volumes for persistent data
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./config:/app/config:ro

    # Resource limits (adjust based on your system)
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

    # Logging configuration
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

    # Network (optional - for Prometheus monitoring)
    # networks:
    #   - eve-q-network

