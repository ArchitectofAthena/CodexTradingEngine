name: Lint, Format, and Test

on:
  push:
    paths:
      - 'eve_q/cross_repo_ingestor.py'
      - 'eve_q/receipt_emitter.py'
      - 'eve_q/alert_dispatcher.py'
      - 'eve_q/risk_management.py'
      - 'eve_q/organ_contract.py'
      - 'eve_q/ttl_policy.py'
      - 'eve_q/artifact_carrier.py'
      - 'eve_q/allocation/**'
      - 'eve_q/telemetry/**'
      - 'contracts/**'
      - 'tests/test_cross_repo_ingestor.py'
      - 'tests/test_receipt_emitter.py'
      - 'tests/test_alert_dispatcher.py'
      - 'tests/test_risk_management.py'
      - 'tests/test_organ_contract_scaffold.py'
      - 'tests/test_organ_contract_enforcement.py'
      - 'tests/test_ttl_policy_scaffold.py'
      - 'tests/test_ttl_policy_evaluator.py'
      - 'tests/test_artifact_carrier_manifest.py'
      - 'tests/test_artifact_carrier_example.py'
      - 'tests/test_receipt_carrier_attestation.py'
      - 'tests/test_receipt_carrier_attestation_example.py'
      - 'tests/test_readme_constitutional_surface_index.py'
      - 'README.md'
      - 'examples/receipt_carrier_attestation.example.json'
      - 'docs/receipt_carrier_attestation_example.md'
      - 'eve_q/receipt_carrier_attestation.py'
      - 'examples/artifact_carrier_manifest.example.json'
      - 'docs/artifact_carrier_manifest_example.md'
      - 'tests/test_charity_allocation_diversity_guard.py'
      - 'tests/test_need_impact_scoring.py'
      - 'requirements.txt'
      - 'requirements-dev.txt'
      - 'pyproject.toml'
      - '.flake8'
      - '.github/workflows/lint.yml'
  pull_request:
    paths:
      - 'eve_q/cross_repo_ingestor.py'
      - 'eve_q/receipt_emitter.py'
      - 'eve_q/alert_dispatcher.py'
      - 'eve_q/risk_management.py'
      - 'eve_q/organ_contract.py'
      - 'eve_q/ttl_policy.py'
      - 'eve_q/artifact_carrier.py'
      - 'eve_q/allocation/**'
      - 'eve_q/telemetry/**'
      - 'contracts/**'
      - 'tests/test_cross_repo_ingestor.py'
      - 'tests/test_receipt_emitter.py'
      - 'tests/test_alert_dispatcher.py'
      - 'tests/test_risk_management.py'
      - 'tests/test_organ_contract_scaffold.py'
      - 'tests/test_organ_contract_enforcement.py'
      - 'tests/test_ttl_policy_scaffold.py'
      - 'tests/test_ttl_policy_evaluator.py'
      - 'tests/test_artifact_carrier_manifest.py'
      - 'tests/test_charity_allocation_diversity_guard.py'
      - 'tests/test_need_impact_scoring.py'
      - 'requirements.txt'
      - 'requirements-dev.txt'
      - 'pyproject.toml'
      - '.flake8'
      - '.github/workflows/lint.yml'

jobs:
  lint-format-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run black on constitutional scope
        run: |
          black --check \
            eve_q/cross_repo_ingestor.py \
            eve_q/receipt_emitter.py \
            eve_q/alert_dispatcher.py \
            eve_q/risk_management.py \
            eve_q/organ_contract.py \
          eve_q/ttl_policy.py \
          eve_q/artifact_carrier.py \
          eve_q/receipt_carrier_attestation.py \
            eve_q/allocation/charity_router.py \
            eve_q/allocation/geodesic_policy.py \
            eve_q/telemetry/impact_score.py \
            eve_q/telemetry/need_score.py \
            tests/test_cross_repo_ingestor.py \
            tests/test_receipt_emitter.py \
            tests/test_alert_dispatcher.py \
            tests/test_risk_management.py \
            tests/test_organ_contract_scaffold.py \
            tests/test_organ_contract_enforcement.py \
            tests/test_ttl_policy_scaffold.py \
          tests/test_ttl_policy_evaluator.py \
          tests/test_artifact_carrier_manifest.py \
          tests/test_artifact_carrier_example.py \
          tests/test_receipt_carrier_attestation.py \
          tests/test_receipt_carrier_attestation_example.py \
          tests/test_readme_constitutional_surface_index.py \
            tests/test_charity_allocation_diversity_guard.py \
            tests/test_need_impact_scoring.py

      - name: Run flake8 on constitutional scope
        run: |
          flake8 \
            eve_q/cross_repo_ingestor.py \
            eve_q/receipt_emitter.py \
            eve_q/alert_dispatcher.py \
            eve_q/risk_management.py \
            eve_q/organ_contract.py \
          eve_q/ttl_policy.py \
          eve_q/artifact_carrier.py \
            eve_q/allocation/charity_router.py \
            eve_q/allocation/geodesic_policy.py \
            eve_q/telemetry/impact_score.py \
            eve_q/telemetry/need_score.py \
            tests/test_cross_repo_ingestor.py \
            tests/test_receipt_emitter.py \
            tests/test_alert_dispatcher.py \
            tests/test_risk_management.py \
            tests/test_organ_contract_scaffold.py \
            tests/test_organ_contract_enforcement.py \
            tests/test_ttl_policy_scaffold.py \
          tests/test_ttl_policy_evaluator.py \
          tests/test_artifact_carrier_manifest.py \
            tests/test_charity_allocation_diversity_guard.py \
            tests/test_need_impact_scoring.py

      - name: Run constitutional tests
        run: |
          pytest -o addopts='' \
            tests/test_cross_repo_ingestor.py \
            tests/test_receipt_emitter.py \
            tests/test_alert_dispatcher.py \
            tests/test_risk_management.py \
            tests/test_organ_contract_scaffold.py \
            tests/test_organ_contract_enforcement.py \
            tests/test_ttl_policy_scaffold.py \
          tests/test_ttl_policy_evaluator.py \
          tests/test_artifact_carrier_manifest.py \
            tests/test_charity_allocation_diversity_guard.py \
            tests/test_need_impact_scoring.py \
            -q
