name: Lint, Format, and Test

on:
  push:
    paths:
      - 'eve_q/cross_repo_ingestor.py'
      - 'eve_q/alert_dispatcher.py'
      - 'eve_q/risk_management.py'
      - 'tests/test_cross_repo_ingestor.py'
      - 'tests/test_alert_dispatcher.py'
      - 'tests/test_risk_management.py'
      - 'requirements.txt'
      - 'requirements-dev.txt'
      - 'pyproject.toml'
      - '.flake8'
      - '.github/workflows/lint.yml'
  pull_request:
    paths:
      - 'eve_q/cross_repo_ingestor.py'
      - 'eve_q/alert_dispatcher.py'
      - 'eve_q/risk_management.py'
      - 'tests/test_cross_repo_ingestor.py'
      - 'tests/test_alert_dispatcher.py'
      - 'tests/test_risk_management.py'
      - 'requirements.txt'
      - 'requirements-dev.txt'
      - 'pyproject.toml'
      - '.flake8'
      - '.github/workflows/lint.yml'

jobs:
  lint-format-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run black on safety bridge scope
        run: |
          black --check \
            eve_q/cross_repo_ingestor.py \
            eve_q/alert_dispatcher.py \
            eve_q/risk_management.py \
            tests/test_cross_repo_ingestor.py \
            tests/test_alert_dispatcher.py \
            tests/test_risk_management.py

      - name: Run flake8 on safety bridge scope
        run: |
          flake8 \
            eve_q/cross_repo_ingestor.py \
            eve_q/alert_dispatcher.py \
            eve_q/risk_management.py \
            tests/test_cross_repo_ingestor.py \
            tests/test_alert_dispatcher.py \
            tests/test_risk_management.py

      - name: Run safety bridge tests
        run: |
          pytest -o addopts='' \
            tests/test_cross_repo_ingestor.py \
            tests/test_alert_dispatcher.py \
            tests/test_risk_management.py \
            -q
