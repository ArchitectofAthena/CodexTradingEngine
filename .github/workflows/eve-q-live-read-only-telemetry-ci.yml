      - "examples/telemetry/source_spec_template_v0_1.json"
      - "examples/telemetry/README.md"
      - "scripts/run_gate1_read_only_capture_v0_1.sh"
      - "tests/test_live_read_only_telemetry_v0_1.py"
      - "tests/test_gate1_pilot_acceptance_v0_1.py"
      - "tests/test_gate1_threat_and_rollback_docs_v0_1.py"
      - "tests/test_gate1_pilot_status_v0_1.py"
      - "tests/test_gate1_read_only_launcher_v0_1.py"
      - "tests/test_gate1_source_review_checklist_v0_1.py"
      - "tests/test_gate1_synthetic_matrix_v0_1.py"
      - "tests/test_gate1_operator_checklist_v0_1.py"
      - "tests/test_gate1_hardening_v0_1.py"
      - "tests/test_gate1_hardened_launcher_v0_1.py"
      - "docs/telemetry/EVE_Q_LIVE_READ_ONLY_TELEMETRY_v0_1.md"
      - "docs/telemetry/EVE_Q_GATE1_PILOT_STATUS_v0_1.md"
      - "docs/telemetry/EVE_Q_GATE1_SOURCE_REVIEW_CHECKLIST_v0_1.md"
      - "docs/telemetry/EVE_Q_GATE1_OPERATOR_CHECKLIST_v0_1.md"
      - "docs/testing/EVE_Q_GATE1_PILOT_ACCEPTANCE_v0_1.json"
      - "docs/testing/EVE_Q_GATE1_SYNTHETIC_TEST_MATRIX_v0_1.md"
      - "docs/security/EVE_Q_GATE1_THREAT_MODEL_DRAFT_v0_1.md"
      - "docs/security/EVE_Q_GATE1_DNS_IP_HARDENING_v0_1.md"
      - "docs/governance/EVE_Q_GATE1_ROLLBACK_PLAN_DRAFT_v0_1.md"
      - "docs/governance/EVE_Q_GATE1_ROLLBACK_RECEIPT_v0_1.md"
      - ".github/workflows/eve-q-live-read-only-telemetry-ci.yml"
  push:
    branches:
      - main
    paths:
      - "eve_q/live_read_only_telemetry.py"
      - "eve_q/gate1_hardening.py"
      - "schemas/live_read_only_telemetry_snapshot_v0_1.schema.json"
      - "schemas/gate1_resolution_receipt_v0_1.schema.json"
      - "schemas/gate1_rollback_receipt_v0_1.schema.json"
      - "examples/telemetry/source_spec_template_v0_1.json"
      - "examples/telemetry/README.md"
      - "scripts/run_gate1_read_only_capture_v0_1.sh"
      - "tests/test_live_read_only_telemetry_v0_1.py"
      - "tests/test_gate1_pilot_acceptance_v0_1.py"
      - "tests/test_gate1_threat_and_rollback_docs_v0_1.py"
      - "tests/test_gate1_pilot_status_v0_1.py"
      - "tests/test_gate1_read_only_launcher_v0_1.py"
      - "tests/test_gate1_source_review_checklist_v0_1.py"
      - "tests/test_gate1_synthetic_matrix_v0_1.py"
      - "tests/test_gate1_operator_checklist_v0_1.py"
      - "tests/test_gate1_hardening_v0_1.py"
      - "tests/test_gate1_hardened_launcher_v0_1.py"
      - "docs/telemetry/EVE_Q_LIVE_READ_ONLY_TELEMETRY_v0_1.md"
      - "docs/telemetry/EVE_Q_GATE1_PILOT_STATUS_v0_1.md"
      - "docs/telemetry/EVE_Q_GATE1_SOURCE_REVIEW_CHECKLIST_v0_1.md"
      - "docs/telemetry/EVE_Q_GATE1_OPERATOR_CHECKLIST_v0_1.md"
      - "docs/testing/EVE_Q_GATE1_PILOT_ACCEPTANCE_v0_1.json"
      - "docs/testing/EVE_Q_GATE1_SYNTHETIC_TEST_MATRIX_v0_1.md"
      - "docs/security/EVE_Q_GATE1_THREAT_MODEL_DRAFT_v0_1.md"
      - "docs/security/EVE_Q_GATE1_DNS_IP_HARDENING_v0_1.md"
      - "docs/governance/EVE_Q_GATE1_ROLLBACK_PLAN_DRAFT_v0_1.md"
      - "docs/governance/EVE_Q_GATE1_ROLLBACK_RECEIPT_v0_1.md"
      - ".github/workflows/eve-q-live-read-only-telemetry-ci.yml"

permissions:
  contents: read

jobs:
  telemetry-membrane:
    name: Read-only telemetry membrane (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Compile membrane and hardening layer
        run: |
          python -m py_compile \
            eve_q/live_read_only_telemetry.py \
            eve_q/gate1_hardening.py
          bash -n scripts/run_gate1_read_only_capture_v0_1.sh

      - name: Run telemetry boundary, hardening, acceptance, and governance tests
        run: |
          python -m pytest -q --no-cov \
            tests/test_live_read_only_telemetry_v0_1.py \
            tests/test_gate1_pilot_acceptance_v0_1.py \
            tests/test_gate1_threat_and_rollback_docs_v0_1.py \
            tests/test_gate1_pilot_status_v0_1.py \
            tests/test_gate1_read_only_launcher_v0_1.py \
            tests/test_gate1_source_review_checklist_v0_1.py \
            tests/test_gate1_synthetic_matrix_v0_1.py \
            tests/test_gate1_operator_checklist_v0_1.py \
            tests/test_gate1_hardening_v0_1.py \
            tests/test_gate1_hardened_launcher_v0_1.py

      - name: Verify source template is non-live placeholder
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          template = json.loads(
              Path(
                  "examples/telemetry/source_spec_template_v0_1.json"
              ).read_text(encoding="utf-8")
          )
          assert template["url"].startswith("https://")
          assert template["allowed_hosts"] == ["data.example.org"]
          assert "replace-with" in template["url"]
          PY
