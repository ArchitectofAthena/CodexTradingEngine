name: Hybrid Benchmark CI

on:
  pull_request:
    paths:
      - "benchmarks/**"
      - "eve_q/hybrid_benchmark.py"
      - "tests/test_hybrid_benchmark.py"
      - "schemas/hybrid_delta_benchmark_case.schema.json"
      - "schemas/hybrid_delta_benchmark_receipt.schema.json"
      - "docs/QAOA_DELTA_PHASE_2E.md"
      - ".github/workflows/hybrid-benchmark-ci.yml"
      - "README.md"
  push:
    branches:
      - main
    paths:
      - "benchmarks/**"
      - "eve_q/hybrid_benchmark.py"
      - "tests/test_hybrid_benchmark.py"
      - "schemas/hybrid_delta_benchmark_case.schema.json"
      - "schemas/hybrid_delta_benchmark_receipt.schema.json"
      - "docs/QAOA_DELTA_PHASE_2E.md"
      - ".github/workflows/hybrid-benchmark-ci.yml"
      - "README.md"

permissions:
  contents: read

jobs:
  python-core:
    name: Python ${{ matrix.python-version }} benchmark core
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install core and tests
        run: python -m pip install -e '.[test]'

      - name: Compile benchmark spine
        run: python -m compileall -q eve_q/hybrid_benchmark.py

      - name: Validate seeded corpus and schemas
        run: |
          python -m json.tool benchmarks/seeded_market_v0_1.json >/dev/null
          python -m json.tool schemas/hybrid_delta_benchmark_case.schema.json >/dev/null
          python -m json.tool schemas/hybrid_delta_benchmark_receipt.schema.json >/dev/null

      - name: Run deterministic benchmark tests
        run: python -m pytest tests/test_hybrid_benchmark.py --no-cov -q

  qiskit-benchmark:
    name: Qiskit seeded-QUBO comparison
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install quantum lane
        run: python -m pip install -e '.[test,quantum]'

      - name: Compare local QAOA against exact baselines on seeded QUBOs
        run: |
          python - <<'PY'
          import math
          from pathlib import Path

          from eve_q.flash_liquidity import (
              build_flash_liquidity_qubo,
              enumerate_flash_liquidity_candidates,
          )
          from eve_q.hybrid_benchmark import load_benchmark_case
          from eve_q.qaoa_delta import build_cycle_selection_qubo, enumerate_triangular_cycles
          from eve_q.qaoa_sampling import optimize_qaoa_statevector, qubo_model_sha256

          case = load_benchmark_case(Path("benchmarks/seeded_market_v0_1.json"))
          cycles = enumerate_triangular_cycles(
              case.edges,
              gas_penalty_log=case.gas_penalty_log,
              minimum_log_delta=case.minimum_log_delta,
          )
          route_model = build_cycle_selection_qubo(cycles)
          route_receipt = optimize_qaoa_statevector(
              route_model,
              cycles,
              reps=1,
              parameter_grid=(0.0, math.pi / 2.0),
              max_evaluations=8,
          )
          assert route_receipt.model_sha256 == qubo_model_sha256(route_model)
          assert route_receipt.energy_gap_to_classical >= -1e-12
          route_id = route_receipt.classical_selection.selected_candidate_ids[0]
          route = next(cycle for cycle in cycles if cycle.candidate_id == route_id)

          candidates = enumerate_flash_liquidity_candidates(
              (route,), case.providers, case.buckets
          )
          flash_model = build_flash_liquidity_qubo(candidates)
          flash_cycles = tuple(candidate.as_qaoa_cycle() for candidate in candidates)
          flash_receipt = optimize_qaoa_statevector(
              flash_model,
              flash_cycles,
              reps=1,
              parameter_grid=(0.0, math.pi / 2.0),
              max_evaluations=8,
          )
          assert flash_receipt.model_sha256 == qubo_model_sha256(flash_model)
          assert flash_receipt.energy_gap_to_classical >= -1e-12
          assert route_receipt.authority is False
          assert flash_receipt.authority is False
          print("Seeded route and liquidity QUBOs compared against exact baselines.")
          PY

  rust-benchmark-integration:
    name: Full seeded replay through Rust verifiers
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Python test lane
        run: python -m pip install -e '.[test]'

      - name: Build isolated Rust verifiers
        run: cargo build --manifest-path rust/delta-verifier/Cargo.toml --bins

      - name: Exercise complete deterministic benchmark spine
        env:
          CODEX_DELTA_VERIFIER_BIN: ${{ github.workspace }}/rust/delta-verifier/target/debug/codex-delta-verifier
          CODEX_FLASH_LIQUIDITY_VERIFIER_BIN: ${{ github.workspace }}/rust/delta-verifier/target/debug/codex-flash-liquidity-verifier
        run: python -m pytest tests/test_hybrid_benchmark.py --no-cov -q

      - name: Emit canonical simulation receipt and envelope
        run: |
          python -m eve_q.hybrid_benchmark \
            --case benchmarks/seeded_market_v0_1.json \
            --route-verifier "${{ github.workspace }}/rust/delta-verifier/target/debug/codex-delta-verifier" \
            --flash-verifier "${{ github.workspace }}/rust/delta-verifier/target/debug/codex-flash-liquidity-verifier" \
            --receipt-out artifacts/hybrid_benchmark_receipt.json \
            --envelope-out artifacts/hybrid_benchmark_envelope.json \
            --source-commit "${{ github.sha }}" \
            --root "${{ github.workspace }}"
          python -m json.tool artifacts/hybrid_benchmark_receipt.json >/dev/null
          python -m json.tool artifacts/hybrid_benchmark_envelope.json >/dev/null

      - uses: actions/upload-artifact@v4
        with:
          name: hybrid-delta-benchmark-receipts
          path: artifacts/*.json
          if-no-files-found: error
