name: Strategy Packet Uplift CI

on:
  pull_request:
    paths:
      - "eve_q/strategy_packet_uplift.py"
      - "tests/test_strategy_packet_uplift.py"
      - "examples/seeded_strategy_packet_v0_1.json"
      - "schemas/codex_planning_uplift_receipt.schema.json"
      - "docs/STRATEGY_PACKET_UPLIFT_V0_1.md"
      - ".github/workflows/strategy-packet-uplift-ci.yml"
  push:
    branches:
      - main
    paths:
      - "eve_q/strategy_packet_uplift.py"
      - "tests/test_strategy_packet_uplift.py"
      - "examples/seeded_strategy_packet_v0_1.json"
      - "schemas/codex_planning_uplift_receipt.schema.json"
      - "docs/STRATEGY_PACKET_UPLIFT_V0_1.md"
      - ".github/workflows/strategy-packet-uplift-ci.yml"

permissions:
  contents: read

jobs:
  python-contract:
    name: Python ${{ matrix.python-version }} packet contract
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install core and tests
        run: python -m pip install -e '.[test]'

      - name: Compile packet consumer
        run: python -m compileall -q eve_q/strategy_packet_uplift.py

      - name: Validate deterministic fixture and schema
        run: |
          python -m json.tool examples/seeded_strategy_packet_v0_1.json >/dev/null
          python -m json.tool schemas/codex_planning_uplift_receipt.schema.json >/dev/null

      - name: Run packet membrane tests
        run: python -m pytest tests/test_strategy_packet_uplift.py --no-cov -q

  rust-uplift-integration:
    name: Full packet-guided replay through Rust verifiers
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Python test lane
        run: python -m pip install -e '.[test]'

      - name: Build isolated Rust verifiers
        run: cargo build --manifest-path rust/delta-verifier/Cargo.toml --bins

      - name: Run deterministic packet-guided uplift tests
        env:
          CODEX_DELTA_VERIFIER_BIN: ${{ github.workspace }}/rust/delta-verifier/target/debug/codex-delta-verifier
          CODEX_FLASH_LIQUIDITY_VERIFIER_BIN: ${{ github.workspace }}/rust/delta-verifier/target/debug/codex-flash-liquidity-verifier
        run: python -m pytest tests/test_strategy_packet_uplift.py --no-cov -q

      - name: Emit planning-uplift receipt
        run: |
          python -m eve_q.strategy_packet_uplift \
            --packet examples/seeded_strategy_packet_v0_1.json \
            --case benchmarks/seeded_market_v0_1.json \
            --route-verifier "${{ github.workspace }}/rust/delta-verifier/target/debug/codex-delta-verifier" \
            --flash-verifier "${{ github.workspace }}/rust/delta-verifier/target/debug/codex-flash-liquidity-verifier" \
            --receipt-out artifacts/planning_uplift_receipt.json \
            --now 2026-07-11T03:00:00Z \
            --expected-manifest-cid bafkreifllgyxq2dluftpa5y6qtalomjonpe3tuwv5g2jnyd4luas52yvna \
            --expected-source-commit ArchitectofAthena/spiralbloom-os=b64c3753fca90f869302dca45850256936d80e0f \
            --expected-source-commit ArchitectofAthena/CodexTradingEngine=17d0107ded1148a4b7d118d68068b1664400d3eb
          python -m json.tool artifacts/planning_uplift_receipt.json >/dev/null

      - uses: actions/upload-artifact@v4
        with:
          name: planning-uplift-receipt
          path: artifacts/planning_uplift_receipt.json
          if-no-files-found: error
