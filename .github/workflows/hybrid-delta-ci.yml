name: Hybrid Delta CI

on:
  pull_request:
    paths:
      - "README.md"
      - "eve_q/qaoa_delta.py"
      - "eve_q/qaoa_sampling.py"
      - "eve_q/rust_repricing.py"
      - "eve_q/delta_robustness.py"
      - "eve_q/flash_liquidity.py"
      - "tests/test_qaoa_delta.py"
      - "tests/test_qaoa_sampling.py"
      - "tests/test_rust_repricing.py"
      - "tests/test_delta_robustness.py"
      - "tests/test_flash_liquidity.py"
      - "rust/delta-verifier/**"
      - "schemas/delta_repricing_request.schema.json"
      - "schemas/delta_repricing_response.schema.json"
      - "schemas/delta_robustness_receipt.schema.json"
      - "schemas/flash_liquidity_request.schema.json"
      - "schemas/flash_liquidity_response.schema.json"
      - "docs/QAOA_DELTA_TRIANGULATION_v0_1.md"
      - "docs/QAOA_DELTA_PHASE_2A.md"
      - "docs/QAOA_DELTA_PHASE_2B.md"
      - "docs/QAOA_DELTA_PHASE_2C1.md"
      - "docs/QAOA_DELTA_PHASE_2C2.md"
      - "pyproject.toml"
      - ".github/workflows/hybrid-delta-ci.yml"
  push:
    branches:
      - main
    paths:
      - "README.md"
      - "eve_q/qaoa_delta.py"
      - "eve_q/qaoa_sampling.py"
      - "eve_q/rust_repricing.py"
      - "eve_q/delta_robustness.py"
      - "eve_q/flash_liquidity.py"
      - "tests/test_qaoa_delta.py"
      - "tests/test_qaoa_sampling.py"
      - "tests/test_rust_repricing.py"
      - "tests/test_delta_robustness.py"
      - "tests/test_flash_liquidity.py"
      - "rust/delta-verifier/**"
      - "schemas/delta_repricing_request.schema.json"
      - "schemas/delta_repricing_response.schema.json"
      - "schemas/delta_robustness_receipt.schema.json"
      - "schemas/flash_liquidity_request.schema.json"
      - "schemas/flash_liquidity_response.schema.json"
      - "docs/QAOA_DELTA_TRIANGULATION_v0_1.md"
      - "docs/QAOA_DELTA_PHASE_2A.md"
      - "docs/QAOA_DELTA_PHASE_2B.md"
      - "docs/QAOA_DELTA_PHASE_2C1.md"
      - "docs/QAOA_DELTA_PHASE_2C2.md"
      - "pyproject.toml"
      - ".github/workflows/hybrid-delta-ci.yml"

permissions:
  contents: read

jobs:
  python-core:
    name: Python ${{ matrix.python-version }} core
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install core and tests
        run: python -m pip install -e '.[test]'

      - name: Compile hybrid delta core
        run: |
          python -m compileall -q \
            eve_q/qaoa_delta.py \
            eve_q/qaoa_sampling.py \
            eve_q/rust_repricing.py \
            eve_q/delta_robustness.py \
            eve_q/flash_liquidity.py

      - name: Validate evidence schema syntax
        run: |
          python -m json.tool schemas/delta_robustness_receipt.schema.json >/dev/null
          python -m json.tool schemas/flash_liquidity_request.schema.json >/dev/null
          python -m json.tool schemas/flash_liquidity_response.schema.json >/dev/null

      - name: Run hybrid delta tests
        run: |
          python -m pytest \
            tests/test_qaoa_delta.py \
            tests/test_qaoa_sampling.py \
            tests/test_rust_repricing.py \
            tests/test_delta_robustness.py \
            tests/test_flash_liquidity.py \
            --no-cov -q

  qiskit-adapter:
    name: Qiskit 2.5 adapter
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install quantum lane
        run: python -m pip install -e '.[test,quantum]'

      - name: Construct and sample route and liquidity QAOAs locally
        run: |
          python - <<'PY'
          import math

          from eve_q.flash_liquidity import (
              FlashAmountBucket,
              FlashLiquidityProvider,
              build_flash_liquidity_qubo,
              enumerate_flash_liquidity_candidates,
          )
          from eve_q.qaoa_delta import (
              MarketEdge,
              TriangularCycle,
              build_cycle_selection_qubo,
              enumerate_triangular_cycles,
          )
          from eve_q.qaoa_sampling import optimize_qaoa_statevector

          cycle = TriangularCycle(
              candidate_id="triangle:test",
              edge_ids=("test:a", "test:b", "test:c"),
              asset_path=("USD", "ETH", "BTC", "USD"),
              net_multiplier=math.exp(0.02),
              net_log_delta=0.02,
          )
          model = build_cycle_selection_qubo((cycle,))
          receipt = optimize_qaoa_statevector(
              model,
              (cycle,),
              reps=1,
              parameter_grid=(0.0, math.pi / 2.0),
              max_evaluations=8,
          )
          assert receipt.model_sha256
          assert receipt.classical_selection.selected_candidate_ids == ("triangle:test",)

          edges = (
              MarketEdge("usd-eth", "USD", "ETH", 0.0005),
              MarketEdge("eth-btc", "ETH", "BTC", 0.05),
              MarketEdge("btc-usd", "BTC", "USD", 41_000.0),
          )
          route = enumerate_triangular_cycles(edges)[0]
          borrowed_asset = route.asset_path[0]
          candidates = enumerate_flash_liquidity_candidates(
              (route,),
              (
                  FlashLiquidityProvider(
                      "flash-provider:test",
                      9.0,
                      {borrowed_asset: 5_000.0},
                  ),
              ),
              (
                  FlashAmountBucket(
                      f"flash-bucket:{borrowed_asset.lower()}-1000",
                      borrowed_asset,
                      1_000.0,
                  ),
              ),
          )
          flash_model = build_flash_liquidity_qubo(candidates)
          flash_cycles = tuple(candidate.as_qaoa_cycle() for candidate in candidates)
          flash_receipt = optimize_qaoa_statevector(
              flash_model,
              flash_cycles,
              reps=1,
              parameter_grid=(0.0, math.pi / 2.0),
              max_evaluations=8,
          )
          assert flash_receipt.model_sha256
          assert flash_receipt.classical_selection.selected_candidate_ids == (
              candidates[0].candidate_id,
          )
          assert flash_receipt.authority is False
          print("Route and flash-liquidity QAOA receipts constructed locally.")
          PY

  rust-verifier:
    name: Rust exact verifiers
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Run Rust tests
        run: cargo test --manifest-path rust/delta-verifier/Cargo.toml

  bridge-integration:
    name: Python to Rust repricing, robustness, and liquidity bridge
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Python test lane
        run: python -m pip install -e '.[test]'

      - name: Build isolated Rust verifiers
        run: cargo build --manifest-path rust/delta-verifier/Cargo.toml --bins

      - name: Exercise bounded subprocess, robustness, and liquidity contracts
        env:
          CODEX_DELTA_VERIFIER_BIN: ${{ github.workspace }}/rust/delta-verifier/target/debug/codex-delta-verifier
          CODEX_FLASH_LIQUIDITY_VERIFIER_BIN: ${{ github.workspace }}/rust/delta-verifier/target/debug/codex-flash-liquidity-verifier
        run: |
          python -m pytest \
            tests/test_rust_repricing.py \
            tests/test_delta_robustness.py \
            tests/test_flash_liquidity.py \
            --no-cov -q
